<!-- 告诉浏览器文件的类型为html文件 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- html文件的字符集 -->
  <meta charset="UTF-8">
  <!-- 设置网页在移动端的宽度及缩放比例 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Html快速入门</title>
</head>
<body>
  <h1>HTML快速入门</h1>
  <img src="img/1.png" alt="1.png">
  <!-- 定义一个一级标题，标题内容是hello  -->
   <h1>hello</h1>
   <h1>hello2</h1>
</body>
</html>
